<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Gửi Notification</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    h1 {
      color: #005A8C;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }
    
    .row.full {
      grid-template-columns: 1fr;
    }
    
    .form-group {
      display: flex;
      flex-direction: column;
    }
    
    label {
      font-weight: bold;
      color: #005A8C;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    input, textarea, select {
      padding: 12px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: 0.3s;
    }
    
    input:focus, textarea:focus, select:focus {
      border-color: #BFA15F;
      outline: none;
      box-shadow: 0 0 0 3px rgba(191,161,95,0.1);
    }
    
    textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 30px;
    }
    
    button {
      flex: 1;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    
    .btn-primary {
      background: #005A8C;
      color: white;
    }
    
    .btn-primary:hover {
      background: #004070;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,90,140,0.3);
    }
    
    .btn-secondary {
      background: #BFA15F;
      color: white;
    }
    
    .btn-secondary:hover {
      background: #a68a4a;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(191,161,95,0.3);
    }
    
    .btn-danger {
      background: #dc3545;
      color: white;
      flex: 0.5;
    }
    
    .btn-danger:hover {
      background: #c82333;
      transform: translateY(-2px);
    }
    
    .status-message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
    }
    
    .status-success {
      background: #d4edda;
      border: 1px solid #c3e6cb;
      color: #155724;
      display: block;
    }
    
    .status-error {
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      color: #721c24;
      display: block;
    }
    
    .notification-list {
      margin-top: 40px;
      border-top: 2px solid #eee;
      padding-top: 30px;
    }
    
    .notification-list h2 {
      color: #005A8C;
      margin-bottom: 20px;
      font-size: 18px;
    }
    
    .notification-item {
      background: #f8f9fa;
      border-left: 4px solid #BFA15F;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .notification-content {
      flex: 1;
    }
    
    .notification-content p {
      margin: 5px 0;
      font-size: 14px;
    }
    
    .notification-content strong {
      color: #005A8C;
    }
    
    .notification-time {
      color: #999;
      font-size: 12px;
      margin-top: 5px;
    }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      margin-left: 10px;
    }
    
    .badge-pending {
      background: #ffc107;
      color: #333;
    }
    
    .badge-sent {
      background: #28a745;
      color: white;
    }
    
    .info-box {
      background: #e7f3ff;
      border-left: 4px solid #2196F3;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    
    .info-box p {
      margin: 5px 0;
      font-size: 14px;
      color: #1565c0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📬 Admin - Gửi Notification</h1>
    <p class="subtitle">Gửi thông báo cho khách hàng qua Google Sheet</p>
    
    <div id="statusMessage" class="status-message"></div>
    
    <div class="info-box">
      <p>✓ Tất cả notifications sẽ được lưu vào Google Sheet</p>
      <p>✓ Khách hàng sẽ nhận notification khi nhập PNR</p>
      <p>✓ Hỗ trợ đa ngôn ngữ: Tiếng Việt, English, 中文, 日本語, 한국어</p>
    </div>
    
    <div class="row">
      <div class="form-group">
        <label>👤 PNR / Booking Code (bắt buộc)</label>
        <input type="text" id="pnrInput" placeholder="VD: D45CQM" maxlength="10">
      </div>
      <div class="form-group">
        <label>🌐 Ngôn ngữ (bắt buộc)</label>
        <select id="langSelect">
          <option value="vi">🇻🇳 Tiếng Việt</option>
          <option value="en">🇬🇧 English</option>
          <option value="zh">🇨🇳 中文</option>
          <option value="ja">🇯🇵 日本語</option>
          <option value="ko">🇰🇷 한국어</option>
        </select>
      </div>
    </div>
    
    <div class="row full">
      <div class="form-group">
        <label>📌 Tiêu đề (bắt buộc)</label>
        <input type="text" id="titleInput" placeholder="VD: ⚠️ Cập nhật chuyến bay" maxlength="100">
      </div>
    </div>
    
    <div class="row full">
      <div class="form-group">
        <label>📝 Nội dung (bắt buộc)</label>
        <textarea id="bodyInput" placeholder="VD: Cửa khởi hành của bạn đã thay đổi từ cửa 26 sang cửa 28. Vui lòng di chuyển đến cửa mới."></textarea>
      </div>
    </div>
    
    <div class="btn-group">
      <button class="btn-primary" onclick="sendNotification()">📤 Gửi Notification</button>
      <button class="btn-secondary" onclick="clearForm()">🔄 Xóa Form</button>
    </div>
    
    <!-- Notification List Section -->
    <div class="notification-list">
      <h2>📋 Danh sách Notifications gần đây</h2>
      <div id="notificationContainer"></div>
    </div>
  </div>

  <script>
    const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzmlTkxwtihanlQTcZzXZ8lSzjcBRgZ9F-j-H-AYOkcQfYonjNGs0DjNRhONZD6gkTy/exec';
    
    function showStatus(message, isSuccess) {
      const el = document.getElementById('statusMessage');
      el.textContent = message;
      el.className = 'status-message ' + (isSuccess ? 'status-success' : 'status-error');
      
      setTimeout(() => {
        el.style.display = 'none';
      }, 5000);
    }
    
    function validateForm() {
      const pnr = document.getElementById('pnrInput').value.trim();
      const title = document.getElementById('titleInput').value.trim();
      const body = document.getElementById('bodyInput').value.trim();
      
      if (!pnr) {
        showStatus('❌ Vui lòng nhập PNR', false);
        return false;
      }
      
      if (!title) {
        showStatus('❌ Vui lòng nhập Tiêu đề', false);
        return false;
      }
      
      if (!body) {
        showStatus('❌ Vui lòng nhập Nội dung', false);
        return false;
      }
      
      return true;
    }
    
    async function sendNotification() {
      if (!validateForm()) return;
      
      const pnr = document.getElementById('pnrInput').value.trim().toUpperCase();
      const lang = document.getElementById('langSelect').value;
      const title = document.getElementById('titleInput').value.trim();
      const body = document.getElementById('bodyInput').value.trim();
      
      try {
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL + '?action=save', {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=UTF-8'
          },
          body: JSON.stringify({
            action: 'save',
            pnr: pnr,
            lang: lang,
            title: title,
            body: body,
            sendImmediately: true
          })
        });
        
        // Google Apps Script doesn't return JSON in same way, just check if successful
        showStatus(`✅ Gửi notification cho ${pnr} thành công!`, true);
        clearForm();
        loadNotifications();
        
      } catch(error) {
        showStatus(`❌ Lỗi: ${error.message}`, false);
      }
    }
    
    function clearForm() {
      document.getElementById('pnrInput').value = '';
      document.getElementById('titleInput').value = '';
      document.getElementById('bodyInput').value = '';
      document.getElementById('langSelect').value = 'vi';
    }
    
    async function loadNotifications() {
      try {
        const response = await fetch(GOOGLE_APPS_SCRIPT_URL + '?action=getAll');
        const result = await response.json();
        
        if (result.success && result.data) {
          displayNotifications(result.data);
        }
      } catch(error) {
        console.log('Failed to load notifications:', error);
      }
    }
    
    function displayNotifications(data) {
      const container = document.getElementById('notificationContainer');
      
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color:#999;">Chưa có notifications</p>';
        return;
      }
      
      // Show latest first
      const sorted = data.reverse().slice(0, 10);
      
      container.innerHTML = sorted.map(notif => `
        <div class="notification-item">
          <div class="notification-content">
            <p><strong>PNR:</strong> ${notif.pnr}</p>
            <p><strong>Title:</strong> ${notif.title}</p>
            <p><strong>Body:</strong> ${notif.body}</p>
            <p class="notification-time">
              ${notif.timestamp}
              <span class="badge badge-${notif.status === 'sent' ? 'sent' : 'pending'}">
                ${notif.status === 'sent' ? '✓ Sent' : 'Pending'}
              </span>
            </p>
          </div>
        </div>
      `).join('');
    }
    
    // Load notifications on page load
    window.addEventListener('load', () => {
      loadNotifications();
      
      // Reload every 30 seconds
      setInterval(loadNotifications, 30000);
    });
  </script>
</body>
</html>
